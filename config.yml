recipe: default.v1
language: en
assistant_id: azure-space
pipeline:
- name: SearchReadyLLMCommandGenerator
  llm:
    model_group: openai-gpt-5-1
  flow_retrieval:
    active: false
policies:
- name: FlowPolicy
- name: EnterpriseSearchPolicy
  vector_store:
    type: faiss
    source: ./docs
  llm:
    model_group: openai-gpt-5-mini
  embeddings:
    model_group: openai-embeddings
  check_relevancy: true

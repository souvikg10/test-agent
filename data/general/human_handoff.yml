version: "3.1"
flows:
  human_handoff:
    description: >
      Connect the customer with a human support agent when they explicitly ask for a person,
      agent, representative, supervisor, or human support; when order lookup or return creation
      cannot be completed; when eligibility is disputed; or when a request is outside standard
      return and refund support. Do not require additional automation before escalating.
    steps:
      - action: utter_handoff_acknowledgement
      - action: action_mock_route_human_support
      - action: utter_handoff_next_steps

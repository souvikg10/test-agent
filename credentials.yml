# Auto-loaded by `rasa run` (default path, no --credentials flag needed).
#
# IMPORTANT: `rest` must be listed explicitly here. rasa.api.run only
# falls back to the REST connector when NO credentials.yml exists at all
# (`if not connector and not credentials: connector = "rest"`) — once any
# credentials.yml is present, only the channels it lists get registered.
# Without this line, adding custom_channel.WebChatInput below silently
# disabled /webhooks/rest/webhook entirely, breaking both the local Test
# panel (app/api/agents/[slug]/chat/route.ts) and SA's talk_to_assistant
# tool (confirmed live: 404 on /webhooks/rest/webhook once this file
# existed without an explicit `rest:` entry).
rest:
# Adds a shareable, browsable chat page (at /webhooks/chat/) on top of the
# same message-handling logic as the built-in rest channel — see
# custom_channel.py.
custom_channel.WebChatInput:

# Required for the Rasa Inspector (rasa run --inspect, see the Dockerfile's
# CMD). The inspector wraps every configured input channel so its own
# inspect.html page works from any of them, but its real-time chat pane
# and live tracker/flow view specifically talk over Socket.IO — Rasa's
# server-side root route even hardcodes a redirect to
# ./webhooks/socketio/inspect.html when --inspect is on.
#
# user_message_evt/bot_message_evt override SocketIOInput's defaults
# ("user_uttered"/"bot_uttered") — REQUIRED, not optional. Confirmed live
# by reading the Inspector's own bundled JS: it emits "user_message" and
# listens for "bot_message", not the SocketIOInput defaults. Left as
# defaults, the socket connects fine and the input looks enabled, but
# every typed message vanishes silently — the server never sees an event
# it has a handler for, and there's no error on either side to notice.
socketio:
  user_message_evt: user_message
  bot_message_evt: bot_message
